<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Yangin Tupu Takip</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <div class="page-glow page-glow-one"></div>
    <div class="page-glow page-glow-two"></div>
    <header class="topbar">
      <div class="shell">
        <a class="brand" href="{{ url_for('index') }}">
          <span class="brand-mark">V</span>
          <span class="brand-copy">
            <strong>Vesta Yangin</strong>
            <small>Bakim ve QR Takip</small>
          </span>
        </a>
        <nav>
          <a href="{{ url_for('create_extinguisher') }}">Yeni Kayit</a>
        </nav>
      </div>
    </header>

    <main class="shell">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <section class="flash-stack">
            {% for category, message in messages %}
              <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
          </section>
        {% endif %}
      {% endwith %}

      {% block content %}{% endblock %}
    </main>
  </body>
</html>

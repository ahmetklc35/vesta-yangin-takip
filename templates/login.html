<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Giris | Vesta Yangin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body class="login-page">
    <div class="page-glow page-glow-one"></div>
    <div class="page-glow page-glow-two"></div>
    <main class="login-shell">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <section class="flash-stack">
            {% for category, message in messages %}
              <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
          </section>
        {% endif %}
      {% endwith %}
      <section class="login-card">
        <div class="brand login-brand">
          <span class="brand-mark">V</span>
          <span class="brand-copy">
            <strong>Vesta Yangin</strong>
            <small>Sirket Ici Giris</small>
          </span>
        </div>
        <h1>Yonetim Paneli</h1>
        <p class="muted">Tup kayitlari, bakim girisleri ve Excel raporlari icin giris yap.</p>
        <form method="post" class="login-form">
          <label>
            Kullanici adi
            <input type="text" name="username" required>
          </label>
          <label>
            Sifre
            <input type="password" name="password" required>
          </label>
          <button type="submit" class="button login-button">Giris Yap</button>
        </form>
      </section>
    </main>
  </body>
</html>

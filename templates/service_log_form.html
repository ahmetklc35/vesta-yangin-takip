{% extends "base.html" %}

{% block content %}
  <section class="card form-card">
    <div class="section-head">
      <div>
        <h1>Bakim Guncelle</h1>
        <p class="muted">{{ extinguisher.company_name }} / {{ extinguisher.serial_number }}</p>
      </div>
    </div>

    <form method="post" class="grid-form">
      <label>
        Bakim tarihi
        <input type="date" name="service_date" value="{{ form.get('service_date', '') }}" required>
      </label>
      <label>
        Sonraki bakim tarihi
        <input type="date" name="next_service_date" value="{{ form.get('next_service_date', extinguisher.next_service_date) }}" required>
      </label>
      <label>
        Teknisyen
        <input type="text" name="technician_name" value="{{ form.get('technician_name', '') }}" readonly required>
      </label>
      <label>
        Basinç durumu
        <input type="text" name="pressure_status" value="{{ form.get('pressure_status', extinguisher.pressure_status or '') }}">
      </label>
      <label>
        Firma adi
        <input type="text" name="company_name" value="{{ form.get('company_name', extinguisher.company_name) }}">
      </label>
      <label>
        Firma ici konum
        <input type="text" name="location_detail" value="{{ form.get('location_detail', extinguisher.location_detail) }}">
      </label>
      <label>
        Kg
        <input type="text" name="weight_kg" value="{{ form.get('weight_kg', extinguisher.weight_kg) }}">
      </label>
      <label>
        Tup tipi
        <select name="extinguisher_type" id="extinguisher_type">
          <option value="">Seciniz</option>
          {% for option in equipment_options %}
            {% set selected_type = form.get('extinguisher_type', extinguisher.extinguisher_type) %}
            <option value="{{ option }}" {% if selected_type == option %}selected{% endif %}>{{ option }}</option>
          {% endfor %}
        </select>
      </label>
      <label class="full">
        Yapilan islem
        <textarea name="operation_summary" rows="3" required>{{ form.get('operation_summary', '') }}</textarea>
      </label>
      <section class="full checklist-card">
        <h2>Aylik Kontrol Maddeleri</h2>
        <div class="checklist-grid">
          {% for key, label in monthly_control_items %}
            <label class="check-item">
              <input type="checkbox" name="{{ key }}" {% if form.get(key) %}checked{% endif %}>
              <span>{{ label }}</span>
            </label>
          {% endfor %}
        </div>
      </section>
      <section class="full equipment-card" id="equipment-preset-card" hidden>
        <h2 id="equipment-title"></h2>
        <p id="equipment-summary"></p>
        <p id="equipment-features"></p>
        <p id="equipment-technical"></p>
        <img id="equipment-image" alt="Parca ve yedek parca listesi">
      </section>
      <label class="full">
        Notlar
        <textarea name="notes" rows="3">{{ form.get('notes', extinguisher.notes or '') }}</textarea>
      </label>
      <div class="full form-actions">
        <button type="submit" class="button">Bakim Kaydini Ekle</button>
      </div>
    </form>
  </section>
  <script>
    const equipmentPresets = {{ equipment_presets|tojson }};
    const equipmentSelect = document.getElementById('extinguisher_type');
    const presetCard = document.getElementById('equipment-preset-card');
    const titleEl = document.getElementById('equipment-title');
    const summaryEl = document.getElementById('equipment-summary');
    const featuresEl = document.getElementById('equipment-features');
    const technicalEl = document.getElementById('equipment-technical');
    const imageEl = document.getElementById('equipment-image');

    function renderEquipmentPreset() {
      const preset = equipmentPresets[equipmentSelect.value];
      if (!preset) {
        presetCard.hidden = true;
        return;
      }
      titleEl.textContent = preset.title;
      summaryEl.textContent = preset.summary;
      featuresEl.textContent = preset.features;
      technicalEl.textContent = preset.technical_details;
      imageEl.src = "{{ url_for('static', filename='') }}" + preset.image;
      presetCard.hidden = false;
    }

    equipmentSelect.addEventListener('change', renderEquipmentPreset);
    renderEquipmentPreset();
  </script>
{% endblock %}

{% extends "base.html" %}

{% block content %}
  <section class="card form-card">
    <div class="section-head">
      <h1>Yeni Tup Kaydi</h1>
      <span>Ilk QR olusturma adimi</span>
    </div>

    <form method="post" class="grid-form">
      <label>
        Seri numarasi
        <input type="text" name="serial_number" value="{{ form.get('serial_number', '') }}" required>
      </label>
      <label>
        Cari / Firma
        <select name="company_id" id="company_id" required>
          <option value="">Seciniz</option>
          {% for company in companies %}
            <option value="{{ company.id }}"
                    data-company-name="{{ company.name }}"
                    data-company-address="{{ company.address }}"
                    {% if form.get('company_id') == (company.id|string) %}selected{% endif %}>
              {{ company.name }}
            </option>
          {% endfor %}
        </select>
      </label>
      <label>
        Urun grubu
        <select name="asset_category" required>
          {% for category in asset_categories %}
            <option value="{{ category.label }}" {% if form.get('asset_category') == category.label %}selected{% endif %}>{{ category.label }}</option>
          {% endfor %}
        </select>
      </label>
      <label>
        Muayene adresi
        <input type="text" name="company_address" id="company_address" value="{{ form.get('company_address', '') }}" readonly required>
      </label>
      <label>
        Firma yetkili kisi
        <input type="text" name="company_contact" id="company_contact" value="{{ form.get('company_contact', '') }}" required>
      </label>
      <label>
        Firma ici konum
        <input type="text" name="location_detail" value="{{ form.get('location_detail', '') }}" placeholder="Depo girisi, 2. kat koridoru..." required>
      </label>
      <label>
        Kg
        <input type="text" name="weight_kg" value="{{ form.get('weight_kg', '') }}" required>
      </label>
      <label>
        Tup tipi
        <select name="extinguisher_type" id="extinguisher_type" required>
          <option value="">Seciniz</option>
          {% for option in equipment_options %}
            <option value="{{ option }}" {% if form.get('extinguisher_type') == option %}selected{% endif %}>{{ option }}</option>
          {% endfor %}
        </select>
      </label>
      <label>
        Basinç durumu
        <input type="text" name="pressure_status" value="{{ form.get('pressure_status', '') }}" placeholder="Normal, dusuk, yenilendi">
      </label>
      <label>
        YSC sinifi
        <input type="text" name="fire_class" value="{{ form.get('fire_class', '') }}" required>
      </label>
      <label>
        YSC uretici
        <input type="text" name="manufacturer" value="{{ form.get('manufacturer', '') }}" required>
      </label>
      <label>
        Son bakim tarihi
        <input type="date" name="last_service_date" value="{{ form.get('last_service_date', '') }}" required>
      </label>
      <label>
        Hidrostatik test tarihi
        <input type="date" name="hydrostatic_test_date" value="{{ form.get('hydrostatic_test_date', '') }}" required>
      </label>
      <label>
        Sonraki bakim tarihi
        <input type="date" name="next_service_date" value="{{ form.get('next_service_date', '') }}" required>
      </label>
      <label>
        Teknisyen
        <input type="text" name="technician_name" value="{{ form.get('technician_name', '') }}" readonly required>
      </label>
      <label class="full">
        Yapilan islem
        <textarea name="operation_summary" rows="3" required>{{ form.get('operation_summary', '') }}</textarea>
      </label>
      <section class="full checklist-card">
        <h2>Aylik Kontrol Maddeleri</h2>
        <div class="checklist-grid">
          {% for key, label in monthly_control_items %}
            <label class="check-item">
              <input type="checkbox" name="{{ key }}" {% if form.get(key) %}checked{% endif %}>
              <span>{{ label }}</span>
            </label>
          {% endfor %}
        </div>
      </section>
      <section class="full checklist-card">
        <h2>6 Aylik Kontrol Formu Maddeleri</h2>
        <div class="checklist-grid">
          <label class="check-item"><input type="checkbox" name="check_a" {% if form.get('check_a') %}checked{% endif %}><span>a) BELIRLENEN YERE KONULDUĞU</span></label>
          <label class="check-item"><input type="checkbox" name="check_b" {% if form.get('check_b') %}checked{% endif %}><span>b) KULLANMA TALIMATLARI GORUNUMU</span></label>
          <label class="check-item"><input type="checkbox" name="check_c" {% if form.get('check_c') %}checked{% endif %}><span>c) KULLANMA TALIMATI OKUNURLUGU</span></label>
          <label class="check-item"><input type="checkbox" name="check_d" {% if form.get('check_d') %}checked{% endif %}><span>d) MUHUR VE BASINÇ GOSTERGESI UYGUNLUGU</span></label>
          <label class="check-item"><input type="checkbox" name="check_e" {% if form.get('check_e') %}checked{% endif %}><span>e) DOLULUK DURUMU</span></label>
          <label class="check-item"><input type="checkbox" name="check_f" {% if form.get('check_f') %}checked{% endif %}><span>f) NOZUL UYGUNLUGU (PASLANMA VB.)</span></label>
          <label class="check-item"><input type="checkbox" name="check_g" {% if form.get('check_g') %}checked{% endif %}><span>g) BASINÇ GOSTERGESI ISLEVSELLIGI</span></label>
        </div>
      </section>
      <section class="full equipment-card" id="equipment-preset-card" hidden>
        <h2 id="equipment-title"></h2>
        <p id="equipment-summary"></p>
        <p id="equipment-features"></p>
        <p id="equipment-technical"></p>
        <img id="equipment-image" alt="Parca ve yedek parca listesi">
      </section>
      <label class="full">
        Notlar
        <textarea name="notes" rows="3">{{ form.get('notes', '') }}</textarea>
      </label>
      <div class="full form-actions dual-submit-actions">
        <button type="submit" name="submit_action" value="save_print" class="button">Kaydet ve Yazdir</button>
      </div>
      <div class="full form-actions secondary-submit-row">
        <button type="submit" name="submit_action" value="save" class="button secondary">Kaydet</button>
      </div>
    </form>
  </section>
  <script>
    const equipmentPresets = {{ equipment_presets|tojson }};
    const equipmentSelect = document.getElementById('extinguisher_type');
    const companySelect = document.getElementById('company_id');
    const companyAddressInput = document.getElementById('company_address');
    const presetCard = document.getElementById('equipment-preset-card');
    const titleEl = document.getElementById('equipment-title');
    const summaryEl = document.getElementById('equipment-summary');
    const featuresEl = document.getElementById('equipment-features');
    const technicalEl = document.getElementById('equipment-technical');
    const imageEl = document.getElementById('equipment-image');

    function renderEquipmentPreset() {
      const preset = equipmentPresets[equipmentSelect.value];
      if (!preset) {
        presetCard.hidden = true;
        return;
      }
      titleEl.textContent = preset.title;
      summaryEl.textContent = preset.summary;
      featuresEl.textContent = preset.features;
      technicalEl.textContent = preset.technical_details;
      imageEl.src = "{{ url_for('static', filename='') }}" + preset.image;
      presetCard.hidden = false;
    }

    function syncCompanyFields() {
      const selected = companySelect.options[companySelect.selectedIndex];
      companyAddressInput.value = selected?.dataset.companyAddress || '';
    }

    equipmentSelect.addEventListener('change', renderEquipmentPreset);
    companySelect.addEventListener('change', syncCompanyFields);
    syncCompanyFields();
    renderEquipmentPreset();
  </script>
{% endblock %}

{% extends "base.html" %}

{% block content %}
  <section class="card form-card">
    <div class="section-head">
      <h1>Yeni Tup Kaydi</h1>
      <span>Ilk QR olusturma adimi</span>
    </div>

    <form method="post" class="grid-form">
      <label>
        Seri numarasi
        <input type="text" name="serial_number" value="{{ form.get('serial_number', '') }}" required>
      </label>
      <label>
        Firma adi
        <input type="text" name="company_name" value="{{ form.get('company_name', '') }}" required>
      </label>
      <label>
        Firma ici konum
        <input type="text" name="location_detail" value="{{ form.get('location_detail', '') }}" placeholder="Depo girisi, 2. kat koridoru..." required>
      </label>
      <label>
        Kg
        <input type="text" name="weight_kg" value="{{ form.get('weight_kg', '') }}" required>
      </label>
      <label>
        Tup tipi
        <input type="text" name="extinguisher_type" value="{{ form.get('extinguisher_type', '') }}" placeholder="Kuru kimyevi tozlu, CO2..." required>
      </label>
      <label>
        Basinç durumu
        <input type="text" name="pressure_status" value="{{ form.get('pressure_status', '') }}" placeholder="Normal, dusuk, yenilendi">
      </label>
      <label>
        Son bakim tarihi
        <input type="date" name="last_service_date" value="{{ form.get('last_service_date', '') }}" required>
      </label>
      <label>
        Sonraki bakim tarihi
        <input type="date" name="next_service_date" value="{{ form.get('next_service_date', '') }}" required>
      </label>
      <label>
        Teknisyen
        <input type="text" name="technician_name" value="{{ form.get('technician_name', '') }}" required>
      </label>
      <label class="full">
        Yapilan islem
        <textarea name="operation_summary" rows="3" required>{{ form.get('operation_summary', '') }}</textarea>
      </label>
      <label class="full">
        Notlar
        <textarea name="notes" rows="3">{{ form.get('notes', '') }}</textarea>
      </label>
      <div class="full form-actions">
        <button type="submit" class="button">Kaydet ve QR Uret</button>
      </div>
    </form>
  </section>
{% endblock %}
